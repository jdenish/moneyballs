      const generateRandomMatchups = useCallback(() => {
        const shuffle = (arr) => {
          const a = [...arr];
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        };

        // Generate round-robin schedule for a group of team indices
        const generatePoolRR = (poolTeamsList) => {
          const n = poolTeamsList.length;
          if (n < 2) return [];
          const rounds = [];
          // Circle method for round-robin scheduling
          const teams = [...poolTeamsList];
          const numRounds = n % 2 === 0 ? n - 1 : n;
          const half = Math.floor(n / 2);
          // If odd, add a dummy
          if (n % 2 === 1) teams.push(-1);
          const fixed = teams[0];
          const rotating = teams.slice(1);
          for (let r = 0; r < numRounds; r++) {
            const roundMatches = [];
            const current = [fixed, ...rotating];
            for (let i = 0; i < current.length / 2; i++) {
              const t1 = current[i];
              const t2 = current[current.length - 1 - i];
              if (t1 !== -1 && t2 !== -1) {
                roundMatches.push({ t1, t2 });
              }
            }
            rounds.push(roundMatches);
            // Rotate: move last to front of rotating array
            rotating.unshift(rotating.pop());
          }
          return rounds;
        };

        // 0 RR games: skip directly to bracket
        if (rrGames === 0) {
          setRrMatchups([]);
          setPools({});
          setMatchupsGenerated(true);
          setSeedingScores({});
          return;
        }

        // Pool-based matchups (poolSize 3-6)
        if (poolSize >= 3) {
          const numPools = Math.round(teamCount / poolSize);
          const poolAssignments = {};
          const poolTeamsList = Array.from({ length: numPools }, () => []);

          // Snake draft
          for (let i = 0; i < teamCount; i++) {
            const row = Math.floor(i / numPools);
            let poolIdx = i % numPools;
            if (row % 2 === 1) poolIdx = numPools - 1 - poolIdx;
            poolTeamsList[poolIdx].push(i);
            poolAssignments[i] = poolIdx;
          }

          setPools(poolAssignments);

          // Generate full round-robin within each pool
          const allPoolRounds = poolTeamsList.map(pt => generatePoolRR(pt));
          const maxRounds = Math.max(...allPoolRounds.map(r => r.length));

          const rounds = [];
          for (let r = 0; r < maxRounds; r++) {
            const roundMatches = [];
            allPoolRounds.forEach(poolRounds => {
              if (r < poolRounds.length) {
                roundMatches.push(...poolRounds[r]);
              }
            });
            rounds.push({ matches: roundMatches, bye: -1 });
          }

          setRrMatchups(rounds);
          setMatchupsGenerated(true);
          setSeedingScores({});
          return;
        }

        // No pools: generate matchups based on rrGames count
        setPools({});

        if (rrGames === 1) {
          // 1 game: random pairs
          const allTeams = shuffle(Array.from({ length: teamCount }, (_, i) => i));
          const matches = [];
          for (let i = 0; i < allTeams.length - 1; i += 2) {
            matches.push({ t1: allTeams[i], t2: allTeams[i + 1] });
          }
          setRrMatchups([{ matches, bye: -1 }]);
        } else if (rrGames === 2) {
          // 2 games: seed-balanced
          const allTeams = Array.from({ length: teamCount }, (_, i) => i);
          const g1 = [];
          for (let i = 0; i < teamCount - 1; i += 2) {
            g1.push({ t1: allTeams[i], t2: allTeams[i + 1] });
          }
          const g2 = [];
          const used = new Set();
          for (let i = 0; i < teamCount; i++) {
            if (used.has(i)) continue;
            const opponent = i + 2 < teamCount && !used.has(i + 2) ? i + 2 :
                            (i + 1 < teamCount && !used.has(i + 1) ? i + 1 : null);
            if (opponent !== null) {
              g2.push({ t1: i, t2: opponent });
              used.add(i);
              used.add(opponent);
            }
          }
          setRrMatchups([{ matches: shuffle(g1), bye: -1 }, { matches: shuffle(g2), bye: -1 }]);
        } else {
          // 3+ games: sum-balanced matchups via random perfect matching
          const n = teamCount;
          const isOdd = n % 2 === 1;
          // For odd teams: add 1 extra round so everyone plays at least rrGames
          // (n-1 teams play rrGames+1, 1 bye per round, rrGames+1 byes distributed)
          const numRounds = isOdd ? rrGames + 1 : rrGames;
          const pairN = isOdd ? n + 1 : n; // phantom team index = n for odd
          const half = pairN / 2;

          const randomMatching = (played, byeCounts) => {
            for (let a = 0; a < 200; a++) {
              const indices = shuffle(Array.from({ length: pairN }, (_, i) => i));
              const rm = [];
              let byeTeam = -1;
              let ok = true;
              for (let i = 0; i < pairN; i += 2) {
                const a2 = indices[i], b2 = indices[i + 1];
                if (isOdd && (a2 === n || b2 === n)) {
                  // One of these is the phantom — the other gets a bye
                  byeTeam = a2 === n ? b2 : a2;
                  continue;
                }
                if (played[a2].has(b2)) { ok = false; break; }
                rm.push({ t1: a2, t2: b2 });
              }
              if (!ok) continue;
              // Prefer distributing byes: skip if this team already has max byes
              if (isOdd && byeTeam >= 0) {
                const maxByes = Math.ceil(numRounds / n);
                if (byeCounts[byeTeam] >= maxByes + 1) continue;
              }
              if (rm.length === half - (isOdd ? 1 : 0)) return { matches: rm, bye: byeTeam };
            }
            return null;
          };

          let best = null;
          for (let trial = 0; trial < 10000; trial++) {
            const played = {};
            const byeCounts = new Array(n).fill(0);
            for (let i = 0; i < n; i++) played[i] = new Set();
            const rounds = [];
            let valid = true;
            for (let round = 0; round < numRounds; round++) {
              const result = randomMatching(played, byeCounts);
              if (!result) { valid = false; break; }
              result.matches.forEach(({ t1, t2 }) => { played[t1].add(t2); played[t2].add(t1); });
              if (result.bye >= 0) byeCounts[result.bye]++;
              rounds.push({ matches: result.matches, bye: result.bye });
            }
            if (!valid) continue;
            // For odd: ensure no team has more than 2 byes (ideally max 1)
            if (isOdd) {
              const maxByeCount = Math.max(...byeCounts);
              if (maxByeCount > 1) continue; // each team byes at most once
            }
            // Compute games per team
            const gamesPlayed = new Array(n).fill(0);
            rounds.forEach(r => r.matches.forEach(({ t1, t2 }) => { gamesPlayed[t1]++; gamesPlayed[t2]++; }));
            // Everyone must play at least rrGames
            if (gamesPlayed.some(g => g < rrGames)) continue;
            const sums = new Array(n).fill(0);
            rounds.forEach(r => r.matches.forEach(({ t1, t2 }) => {
              sums[t1] += t2 + 1; sums[t2] += t1 + 1;
            }));
            // Use average opponent seed (normalizes for different game counts with odd teams)
            const avgs = sums.map((s, i) => gamesPlayed[i] > 0 ? s / gamesPlayed[i] : 0);
            const meanAvg = avgs.reduce((a, b) => a + b, 0) / n;
            const maxDev = Math.max(...avgs.map(a => Math.abs(a - meanAvg)));
            if (!best || maxDev < best.maxDev) {
              best = { maxDev, rounds, gamesPlayed, byeCounts };
              if (maxDev <= 0.5) break;
            }
          }

          if (!best) {
            // Fallback: simple repeat-avoidance
            const rounds = [];
            const played = {};
            for (let i = 0; i < n; i++) played[i] = new Set();
            for (let round = 0; round < numRounds; round++) {
              const available = shuffle(Array.from({ length: n }, (_, i) => i));
              const rm = [];
              let byeTeam = -1;
              if (isOdd) {
                // Pick team with fewest byes so far
                const byeCounts = new Array(n).fill(0);
                rounds.forEach(r => { if (r.bye >= 0) byeCounts[r.bye]++; });
                const minByes = Math.min(...available.map(t => byeCounts[t]));
                const candidates = available.filter(t => byeCounts[t] === minByes);
                byeTeam = candidates[Math.floor(Math.random() * candidates.length)];
                available.splice(available.indexOf(byeTeam), 1);
              }
              while (available.length >= 2) {
                const t1 = available.shift();
                let t2Idx = available.findIndex(t => !played[t1].has(t));
                if (t2Idx === -1) t2Idx = 0;
                const t2 = available.splice(t2Idx, 1)[0];
                played[t1].add(t2); played[t2].add(t1);
                rm.push({ t1, t2 });
              }
              rounds.push({ matches: rm, bye: byeTeam });
            }
            best = { rounds };
          }

          setRrMatchups(best.rounds.map(r => ({ matches: shuffle([...r.matches]), bye: r.bye })));
        }

        setMatchupsGenerated(true);
        setSeedingScores({});
      }, [teamCount, rrGames, poolSize]);

      const teamData = useMemo(() => {
        return teams.map((t, i) => ({
          seed: i + 1,
          name: getTeamName(t),
          dupr: getTeamDupr(t)
        }));
      }, [teams, getTeamName, getTeamDupr]);

      // seedingMatches is now an array of { matches: [...], bye: teamIdx }
      const seedingMatches = useMemo(() => {
        const t = teamData;
        if (matchupsGenerated && rrMatchups.length > 0) {
          return rrMatchups.map((round, roundIdx) => ({
            matches: round.matches.map((m, i) => ({
              id: `g${roundIdx + 1}m${i}`,
              t1: t[m.t1],
              t2: t[m.t2],
              court: i + 1
            })),
            bye: round.bye >= 0 ? t[round.bye] : null
          }));
        }
        return [];
      }, [teamData, matchupsGenerated, rrMatchups]);

      const standings = useMemo(() => {
        const stats = {};
        teamData.forEach(t => {
          stats[t.seed] = { ...t, wins: 0, losses: 0, pf: 0, pa: 0, h2h: {}, pool: pools[t.seed - 1] };
        });

        // 0 RR games: return teams in import order
        if (rrGames === 0) {
          return Object.values(stats);
        }

        seedingMatches.flatMap(r => r.matches).forEach(m => {
          const score = seedingScores[m.id];
          if (score && score.s1 !== '' && score.s2 !== '' && score.s1 !== undefined && score.s2 !== undefined) {
            const s1 = parseInt(score.s1);
            const s2 = parseInt(score.s2);
            if (!isNaN(s1) && !isNaN(s2)) {
              stats[m.t1.seed].pf += s1;
              stats[m.t1.seed].pa += s2;
              stats[m.t2.seed].pf += s2;
              stats[m.t2.seed].pa += s1;

              if (s1 > s2) {
                stats[m.t1.seed].wins++;
                stats[m.t2.seed].losses++;
                stats[m.t1.seed].h2h[m.t2.seed] = { result: 1, pf: s1, pa: s2 };
                stats[m.t2.seed].h2h[m.t1.seed] = { result: -1, pf: s2, pa: s1 };
              } else if (s2 > s1) {
                stats[m.t2.seed].wins++;
                stats[m.t1.seed].losses++;
                stats[m.t2.seed].h2h[m.t1.seed] = { result: 1, pf: s2, pa: s1 };
                stats[m.t1.seed].h2h[m.t2.seed] = { result: -1, pf: s1, pa: s2 };
              }
            }
          }
        });

        // 3-way tiebreaker: group h2h within tied teams, then group PD, then overall PD
        // Only uses H2H when ALL teams in the group played each other (same pool)
        const resolveTiedGroup = (group) => {
          if (group.length <= 1) return group;

          // Check if all teams in the group played each other
          let allPlayedEachOther = true;
          for (let i = 0; i < group.length && allPlayedEachOther; i++) {
            for (let j = i + 1; j < group.length && allPlayedEachOther; j++) {
              if (!group[i].h2h[group[j].seed]) {
                allPlayedEachOther = false;
              }
            }
          }

          if (!allPlayedEachOther) {
            // Cross-pool tie: can't use H2H, sort by overall PD then original seed
            return [...group].sort((a, b) => ((b.pf - b.pa) - (a.pf - a.pa)) || (a.seed - b.seed));
          }

          // All played each other: use group H2H wins, then group PD, then overall PD
          const withG = group.map(t => {
            let gW = 0, gPf = 0, gPa = 0;
            group.forEach(o => {
              if (t.seed === o.seed) return;
              const h = t.h2h[o.seed];
              if (h) {
                if (h.result === 1) gW++;
                gPf += h.pf || 0;
                gPa += h.pa || 0;
              }
            });
            return { ...t, gW, gPd: gPf - gPa };
          });
          withG.sort((a, b) => {
            if (b.gW !== a.gW) return b.gW - a.gW;
            if (b.gPd !== a.gPd) return b.gPd - a.gPd;
            if ((b.pf - b.pa) !== (a.pf - a.pa)) return (b.pf - b.pa) - (a.pf - a.pa);
            return a.seed - b.seed; // Original seed as final tiebreaker
          });
          const result = [];
          let si = 0;
          while (si < withG.length) {
            let sj = si + 1;
            while (sj < withG.length && withG[sj].gW === withG[si].gW && withG[sj].gPd === withG[si].gPd) sj++;
            const sub = withG.slice(si, sj);
            if (sub.length > 1 && sub.length < group.length) {
              result.push(...resolveTiedGroup(sub));
            } else {
              result.push(...sub);
            }
            si = sj;
          }
          return result;
        };
        const allTeams = Object.values(stats).sort((a, b) => b.wins - a.wins);
        const resolved = [];
        let gi = 0;
        while (gi < allTeams.length) {
          let gj = gi + 1;
          while (gj < allTeams.length && allTeams[gj].wins === allTeams[gi].wins) gj++;
          resolved.push(...resolveTiedGroup(allTeams.slice(gi, gj)));
          gi = gj;
        }
        return resolved;
      }, [teamData, seedingScores, seedingMatches, rrGames]);

      // Apply manual standings reorder if set, keeping fresh stats from computed standings
      const displayStandings = useMemo(() => {
        if (!standingsOverride) return standings;
        const ordered = standingsOverride
          .map(seed => standings.find(t => t.seed === seed))
          .filter(Boolean);
        // Add any teams not in the override
        standings.forEach(t => {
          if (!ordered.find(o => o.seed === t.seed)) ordered.push(t);
        });
        return ordered;
      }, [standingsOverride, standings]);

      const bracketTeams = useMemo(() => {
        if (bracketSeedOverride) {
          return { winners: bracketSeedOverride.winners, losers: bracketSeedOverride.losers, swaps: [] };
        }
        if (displayStandings.length < teamCount) return { winners: [], losers: [], swaps: [] };

        // Split into winners and losers based on configured winnersCount
        // When pools are used, guarantee top N from each pool make winners bracket
        const losersCount = teamCount - winnersCount;
        let winners, losers;
        const uniquePools = [...new Set(Object.values(pools))];
        if (uniquePools.length > 1 && winnersCount > 0) {
          const perPool = Math.floor(winnersCount / uniquePools.length);
          const winnersSet = new Set();
          // Take top N from each pool (by overall standings order)
          const poolCounts = {};
          uniquePools.forEach(p => poolCounts[p] = 0);
          for (const team of displayStandings) {
            const p = team.pool;
            if (p !== undefined && poolCounts[p] !== undefined && poolCounts[p] < perPool) {
              winnersSet.add(team.seed);
              poolCounts[p]++;
            }
          }
          // If winnersCount doesn't divide evenly, fill remaining spots by overall rank
          for (const team of displayStandings) {
            if (winnersSet.size >= winnersCount) break;
            if (!winnersSet.has(team.seed)) winnersSet.add(team.seed);
          }
          winners = displayStandings.filter(t => winnersSet.has(t.seed));
          losers = displayStandings.filter(t => !winnersSet.has(t.seed));
        } else {
          winners = displayStandings.slice(0, winnersCount);
          losers = displayStandings.slice(winnersCount);
        }

        const swaps = [];

        // Apply no-repeat constraint: no same-pool matchups in round 1
        // Standard matchups by seed: 1v8, 4v5, 2v7, 3v6 (for 8 teams)
        const applyNoRepeat = (teams, bracketName) => {
          if (teams.length < 2) return teams;
          const result = [...teams];

          // Get matchups based on team count
          const getMatchups = (n) => {
            if (n <= 4) return [[0, n-1], [1, n-2]].filter(m => m[1] >= 0 && m[0] < m[1]);
            if (n <= 6) return [[0, n-1], [1, n-2], [2, n-3]].filter(m => m[1] >= 0 && m[0] < m[1]);
            if (n <= 8) return [[0, 7], [3, 4], [1, 6], [2, 5]].filter(m => m[1] < n);
            return [[0, 7], [3, 4], [1, 6], [2, 5]];
          };

          const matchups = getMatchups(result.length);

          // Check each matchup for same-pool conflict
          for (const [i, j] of matchups) {
            if (i >= result.length || j >= result.length) continue;
            const t1 = result[i];
            const t2 = result[j];

            // Check if same pool (only if pools are assigned)
            if (t1.pool !== undefined && t2.pool !== undefined && t1.pool === t2.pool) {
              // Find someone to swap with (not seed 1, and not from same pool as opponent)
              for (let k = j + 1; k < result.length; k++) {
                if (result[k].pool !== t1.pool) {
                  // Also check that swapping doesn't create a new conflict
                  const otherMatchup = matchups.find(m => m.includes(k));
                  if (otherMatchup) {
                    const otherIdx = otherMatchup[0] === k ? otherMatchup[1] : otherMatchup[0];
                    if (otherIdx < result.length && result[otherIdx].pool === t2.pool) continue; // Would create new conflict
                  }

                  swaps.push({
                    description: `${bracketName}: Swapped seed ${j + 1} (${t2.name}) with seed ${k + 1} (${result[k].name}) to avoid pool rematch`,
                    side: bracketName === 'Winners' ? 'winners' : 'losers',
                    j,
                    k
                  });
                  [result[j], result[k]] = [result[k], result[j]];
                  break;
                }
              }
            }
          }
          return result;
        };

        // Save un-swapped version before applying no-repeat
        const unswappedWinners = [...winners];
        const unswappedLosers = [...losers];

        winners = applyNoRepeat(winners, 'Winners');
        losers = applyNoRepeat(losers, 'Losers');

        return { winners, losers, swaps, unswappedWinners, unswappedLosers };
      }, [displayStandings, teamCount, winnersCount, bracketSeedOverride, pools]);

      // Sync bracketSwaps state from bracketTeams (useEffect instead of setState in useMemo)
      useEffect(() => {
        if (bracketSeedOverride) {
          setBracketSwaps([]);
          setSwapSelections({});
        } else if (bracketTeams.swaps?.length > 0) {
          setBracketSwaps(bracketTeams.swaps);
          setSwapSelections({});
        }
      }, [bracketTeams, bracketSeedOverride]);

      const generateFakeSeedingScores = useCallback(() => {
        const fakeScores = {};
        seedingMatches.flatMap(r => r.matches).forEach(m => {
          const seedDiff = m.t2.seed - m.t1.seed; // positive = t1 is better seed
          const t1WinProb = 0.5 + (seedDiff * 0.03); // 3% advantage per seed difference
          const t1Wins = Math.random() < t1WinProb;
          const winScore = 11;
          const loseScore = Math.floor(Math.random() * 8) + 2; // 2-9
          fakeScores[m.id] = {
            s1: t1Wins ? winScore : loseScore,
            s2: t1Wins ? loseScore : winScore
          };
        });
        setSeedingScores(fakeScores);
      }, [seedingMatches]);

      const generateFakeBracketScores = useCallback(() => {
        const fakeScores = {};
        const getWinner = (id) => {
          const s = fakeScores[id];
          if (!s) return null;
          if (s.games) {
            let t1W = 0, t2W = 0;
            s.games.forEach(g => { if (g.s1 > g.s2) t1W++; else t2W++; });
            return t1W > t2W ? s.t1 : s.t2;
          }
          return parseInt(s.s1) > parseInt(s.s2) ? s.t1 : s.t2;
        };
        const getLoser = (id) => {
          const s = fakeScores[id];
          if (!s) return null;
          if (s.games) {
            let t1W = 0, t2W = 0;
            s.games.forEach(g => { if (g.s1 > g.s2) t1W++; else t2W++; });
            return t1W > t2W ? s.t2 : s.t1;
          }
          return parseInt(s.s1) > parseInt(s.s2) ? s.t2 : s.t1;
        };
        const simulateMatch = (t1, t2) => {
          if (!t1 || !t2) return null;
          const seedDiff = t2.seed - t1.seed;
          const t1WinProb = 0.5 + (seedDiff * 0.025);
          const t1Wins = Math.random() < t1WinProb;
          return { t1, t2, s1: t1Wins ? 15 : Math.floor(Math.random() * 10) + 4, s2: t1Wins ? Math.floor(Math.random() * 10) + 4 : 15 };
        };
        const simulateBo3 = (t1, t2) => {
          if (!t1 || !t2) return null;
          const seedDiff = t2.seed - t1.seed;
          const t1WinProb = 0.5 + (seedDiff * 0.025);
          const games = []; let t1W = 0, t2W = 0;
          while (t1W < 2 && t2W < 2) {
            const w = Math.random() < t1WinProb;
            games.push({ s1: w ? 11 : Math.floor(Math.random() * 8) + 2, s2: w ? Math.floor(Math.random() * 8) + 2 : 11 });
            if (w) t1W++; else t2W++;
          }
          return { t1, t2, games };
        };

        // Simulate all bracket matches in topological order
        // Build dependency graph from bracketMatches
        const matchOrder = bracketType === 'single'
          ? ['se_r1m1','se_r1m2','se_r1m3','se_r1m4','se_qf1','se_qf2','se_qf3','se_qf4','se_sf1','se_sf2','se_f','se_3rd']
          : Object.keys(bracketMatches).sort((a, b) => {
              // Sort: winners first (wqf, wsf, wf), then losers (lr*), then lsf, lf, gf
              const priority = (id) => {
                if (id.startsWith('wqf')) return 10;
                if (id.startsWith('wsf')) return 20;
                if (id === 'wf') return 30;
                if (id.startsWith('lr1')) return 40;
                if (id.startsWith('lr2')) return 50;
                if (id.startsWith('lr3')) return 60;
                if (id.startsWith('lr4')) return 70;
                if (id.startsWith('lr5')) return 80;
                if (id.startsWith('lr6')) return 90;
                if (id === 'lsf') return 100;
                if (id === 'lf') return 110;
                if (id === 'gf') return 120;
                if (id === 'gf2') return 130;
                return 200;
              };
              return priority(a) - priority(b);
            });

        matchOrder.forEach(id => {
          const m = bracketMatches[id];
          if (!m || m.bye) return;
          // Resolve teams: use fakeScores winners where bracket feeds in
          let t1 = m.t1, t2 = m.t2;
          // For fed-in teams, check if they come from previous matches
          const resolveTeam = (team, matchId) => {
            if (team) return team;
            // Try to find from bracket structure
            return null;
          };
          t1 = resolveTeam(t1, id);
          t2 = resolveTeam(t2, id);
          if (!t1 || !t2) return;
          fakeScores[id] = m.bo3 ? simulateBo3(t1, t2) : simulateMatch(t1, t2);
        });

        setBracketScores(fakeScores);
      }, [bracketMatches, bracketType]);

      // Resolve placeholder teams to real teams from standings by seed number
      const resolveTeam = useCallback((team) => {
        if (!team || !team.placeholder) return team;
        const real = displayStandings.find(t => t.seed === team.seed);
        return real || team;
      }, [displayStandings]);

      const getBracketMatchTeam = useCallback((id) => {
        if (bracketOverrides[id] && bracketOverrides[id].winner) {
          return resolveTeam(bracketOverrides[id].winner);
        }
        const score = bracketScores[id];
        if (!score) return null;

        // Handle Bo3 with games array
        if (score.games && score.games.length > 0) {
          let t1Wins = 0, t2Wins = 0;
          score.games.forEach(g => {
            const s1v = parseInt(g.s1), s2v = parseInt(g.s2);
            if (!isNaN(s1v) && !isNaN(s2v)) {
              if (s1v > s2v) t1Wins++;
              else if (s2v > s1v) t2Wins++;
            }
          });
          if (t1Wins >= 2) return resolveTeam(score.t1);
          if (t2Wins >= 2) return resolveTeam(score.t2);
          return null;
        }

        // Regular match
        if (score.s1 === '' || score.s2 === '' || score.s1 === undefined || score.s2 === undefined) return null;
        return parseInt(score.s1) > parseInt(score.s2) ? resolveTeam(score.t1) : resolveTeam(score.t2);
      }, [bracketScores, bracketOverrides, resolveTeam]);

      const getBracketMatchLoser = useCallback((id) => {
        if (bracketOverrides[id] && bracketOverrides[id].loser) {
          return resolveTeam(bracketOverrides[id].loser);
        }
        const score = bracketScores[id];
        if (!score) return null;

        // Handle Bo3 with games array
        if (score.games && score.games.length > 0) {
          let t1Wins = 0, t2Wins = 0;
          score.games.forEach(g => {
            const s1v = parseInt(g.s1), s2v = parseInt(g.s2);
            if (!isNaN(s1v) && !isNaN(s2v)) {
              if (s1v > s2v) t1Wins++;
              else if (s2v > s1v) t2Wins++;
            }
          });
          if (t1Wins >= 2) return resolveTeam(score.t2);
          if (t2Wins >= 2) return resolveTeam(score.t1);
          return null;
        }

        // Regular match
        if (score.s1 === '' || score.s2 === '' || score.s1 === undefined || score.s2 === undefined) return null;
        return parseInt(score.s1) > parseInt(score.s2) ? resolveTeam(score.t2) : resolveTeam(score.t1);
      }, [bracketScores, bracketOverrides, resolveTeam]);

      const bracketMatches = useMemo(() => {
        // Before RR is complete, show empty bracket with seed placeholders
        const hasBracketData = Object.keys(bracketScores).length > 0 || Object.keys(bracketOverrides).length > 0;
        const rrIncomplete = !allSeedingComplete && matchupsGenerated && (rrGames > 0 || Object.keys(pools).length > 0) && !hasBracketData;
        const makePlaceholder = (seed) => ({ seed, name: `#${seed} Seed`, placeholder: true });

        const resolveFromStandings = (team) => {
          if (!team || !team.placeholder) return team;
          const real = displayStandings.find(t => t.seed === team.seed);
          return real || team;
        };
        // Always use displayStandings when available, regardless of rrIncomplete
        const useStandings = displayStandings.length >= teamCount;
        let w, l;
        if (useStandings) {
          w = displayStandings.slice(0, winnersCount);
          l = displayStandings.slice(winnersCount);
        } else if (rrIncomplete) {
          w = Array.from({ length: winnersCount }, (_, i) => makePlaceholder(i + 1));
          l = Array.from({ length: teamCount - winnersCount }, (_, i) => makePlaceholder(winnersCount + i + 1));
        } else {
          w = (bracketTeams.winners || []).map(resolveFromStandings);
          l = (bracketTeams.losers || []).map(resolveFromStandings);
        }
        // ========= SINGLE ELIMINATION =========
        if (bracketType === 'single') {
          const seTeams = (rrIncomplete ? Array.from({ length: teamCount }, (_, i) => makePlaceholder(i + 1)) : displayStandings.slice(0, teamCount)).map(resolveFromStandings);
          if (seTeams.length < 2) return {};
          const matches = {};
          const n = seTeams.length;

          // Standard 8-slot bracket with seeding: 1v8, 4v5, 2v7, 3v6
          const qfSeeds = [[0,7],[3,4],[1,6],[2,5]];

          if (n > 8) {
            // Play-in round for seeds 9+
            // Seeds 9-16 play in, winners face seeds 1-8 in QF
            // Play-in matchups mirror QF seeding: 9v16, 12v13, 10v15, 11v14
            const piSeeds = [[8,15],[11,12],[9,14],[10,13]];
            piSeeds.forEach((pair, i) => {
              const t1 = pair[0] < n ? seTeams[pair[0]] : null;
              const t2 = pair[1] < n ? seTeams[pair[1]] : null;
              if (t1 && t2) {
                matches[`se_r1m${i+1}`] = { id: `se_r1m${i+1}`, t1, t2, round: 'R1', court: i + 1 };
              } else if (t1) {
                matches[`se_r1m${i+1}`] = { id: `se_r1m${i+1}`, t1, t2: null, round: 'R1 (bye)', bye: true };
              }
            });
            // QF: top 8 seeds vs play-in winners
            qfSeeds.forEach((pair, i) => {
              const topSeed = seTeams[pair[0]];
              const piId = `se_r1m${i+1}`;
              const piMatch = matches[piId];
              const opponent = pair[1] < 8 ? seTeams[pair[1]] : (piMatch?.bye ? piMatch?.t1 : getBracketMatchTeam(piId));
              matches[`se_qf${i+1}`] = { id: `se_qf${i+1}`, t1: topSeed, t2: opponent, round: 'QF' };
            });
          } else {
            // 8 or fewer teams: direct QF with byes
            qfSeeds.forEach((pair, i) => {
              const t1 = pair[0] < n ? seTeams[pair[0]] : null;
              const t2 = pair[1] < n ? seTeams[pair[1]] : null;
              if (t1 && t2) {
                matches[`se_qf${i+1}`] = { id: `se_qf${i+1}`, t1, t2, round: 'QF', court: i + 1 };
              } else if (t1) {
                matches[`se_qf${i+1}`] = { id: `se_qf${i+1}`, t1, t2: null, round: 'QF (bye)', bye: true };
              }
            });
          }

          // SF
          const getQfWinner = (id) => matches[id]?.bye ? matches[id]?.t1 : getBracketMatchTeam(id);
          matches.se_sf1 = { id: 'se_sf1', t1: getQfWinner('se_qf1'), t2: getQfWinner('se_qf2'), round: 'SF' };
          matches.se_sf2 = { id: 'se_sf2', t1: getQfWinner('se_qf3'), t2: getQfWinner('se_qf4'), round: 'SF' };

          // Final
          matches.se_f = { id: 'se_f', t1: getBracketMatchTeam('se_sf1'), t2: getBracketMatchTeam('se_sf2'), round: 'Final', bo3: true };

          // 3rd place match
          matches.se_3rd = { id: 'se_3rd', t1: getBracketMatchLoser('se_sf1'), t2: getBracketMatchLoser('se_sf2'), round: '3rd Place' };

          return matches;
        }

        // ========= DOUBLE ELIMINATION =========
        if (w.length < 4) return {};
        const matches = {};

        // Winners bracket
        if (w.length > 8) {
          // 9-12 winners: W-R1 play-in for seeds 9+, then W-QF
          const wr1Pairings = [
            [7, 8],   // wr1m1: seed 8 vs 9 → feeds wqf1
            [6, 9],   // wr1m2: seed 7 vs 10 → feeds wqf3
            [5, 10],  // wr1m3: seed 6 vs 11 → feeds wqf4
            [4, 11],  // wr1m4: seed 5 vs 12 → feeds wqf2
          ];
          wr1Pairings.forEach(([i1, i2], idx) => {
            const matchId = `wr1m${idx + 1}`;
            if (i2 < w.length) {
              matches[matchId] = { id: matchId, t1: w[i1], t2: w[i2], round: 'W-R1', court: 5 + idx };
            } else if (i1 < w.length) {
              matches[matchId] = { id: matchId, t1: w[i1], t2: null, round: 'W-R1 (bye)', bye: true };
            }
          });
          const getWr1Winner = (id) => matches[id]?.bye ? matches[id]?.t1 : getBracketMatchTeam(id);
          const wr1Feed = { wqf1: 'wr1m1', wqf2: 'wr1m4', wqf3: 'wr1m2', wqf4: 'wr1m3' };
          const qfTopSeeds = { wqf1: 0, wqf2: 3, wqf3: 1, wqf4: 2 };
          for (const [qfId, wr1Id] of Object.entries(wr1Feed)) {
            const topSeed = w[qfTopSeeds[qfId]];
            const courtNum = { wqf1: 1, wqf2: 2, wqf3: 3, wqf4: 4 }[qfId];
            if (matches[wr1Id]) {
              const opponent = getWr1Winner(wr1Id);
              matches[qfId] = { id: qfId, t1: topSeed, t2: opponent, round: 'W-QF', court: courtNum };
            } else {
              matches[qfId] = { id: qfId, t1: topSeed, t2: null, round: 'W-QF (bye)', bye: true };
            }
          }
        } else if (w.length >= 8) {
          matches.wqf1 = { id: 'wqf1', t1: w[0], t2: w[7], round: 'W-QF', court: 1 };
          matches.wqf2 = { id: 'wqf2', t1: w[3], t2: w[4], round: 'W-QF', court: 2 };
          matches.wqf3 = { id: 'wqf3', t1: w[1], t2: w[6], round: 'W-QF', court: 3 };
          matches.wqf4 = { id: 'wqf4', t1: w[2], t2: w[5], round: 'W-QF', court: 4 };
        } else if (w.length >= 6) {
          matches.wqf1 = { id: 'wqf1', t1: w[0], t2: w.length > 7 ? w[7] : null, round: w.length > 7 ? 'W-QF' : 'W-QF (bye)', bye: w.length <= 7 };
          matches.wqf2 = { id: 'wqf2', t1: w[3], t2: w[4], round: 'W-QF', court: 2 };
          matches.wqf3 = { id: 'wqf3', t1: w[1], t2: w.length > 6 ? w[6] : null, round: w.length > 6 ? 'W-QF' : 'W-QF (bye)', bye: w.length <= 6 };
          matches.wqf4 = { id: 'wqf4', t1: w[2], t2: w[5], round: 'W-QF', court: 4 };
        } else {
          // 4-5 winners
          matches.wqf1 = { id: 'wqf1', t1: w[0], t2: w.length > 3 ? w[3] : null, round: w.length > 3 ? 'W-QF' : 'W-QF (bye)', bye: w.length <= 3, court: 1 };
          matches.wqf2 = { id: 'wqf2', t1: w[1], t2: w[2], round: 'W-QF', court: 2 };
          matches.wqf3 = { id: 'wqf3', t1: w.length > 4 ? w[4] : null, t2: null, round: 'W-QF (bye)', bye: true };
          matches.wqf4 = { id: 'wqf4', t1: null, t2: null, round: 'W-QF (bye)', bye: true };
        }

        const getWqfWinner = (id) => matches[id]?.bye ? matches[id]?.t1 : getBracketMatchTeam(id);
        matches.wsf1 = { id: 'wsf1', t1: getWqfWinner('wqf1'), t2: getWqfWinner('wqf2'), round: 'W-SF' };
        matches.wsf2 = { id: 'wsf2', t1: getWqfWinner('wqf3'), t2: getWqfWinner('wqf4'), round: 'W-SF' };
        matches.wsf1 = { ...matches.wsf1, bo3: bo3Finals };
        matches.wsf2 = { ...matches.wsf2, bo3: bo3Finals };
        matches.wf = { id: 'wf', t1: getBracketMatchTeam('wsf1'), t2: getBracketMatchTeam('wsf2'), round: 'W-Final', bo3: true };

        // Losers bracket — general algorithm for any loser count (0-12)
        // Crossed drops to prevent rematches: wqf3/4 → top half, wqf1/2 → bottom half
        // Filter out bye matches (no loser to drop)
        const L = l.length;
        const wqfDropsTop = ['wqf3', 'wqf4'].filter(id => !matches[id]?.bye);
        const wqfDropsBottom = ['wqf1', 'wqf2'].filter(id => !matches[id]?.bye);

        const wr1DropIdsForL0 = Object.keys(matches).filter(id => id.startsWith('wr1m') && !matches[id].bye);

        if (L === 0 && wr1DropIdsForL0.length > 0) {
          // All teams in winners WITH play-in — W-R1 losers form initial losers pool
          // W-R1 losers pair up in L-R1, then merge with W-QF losers at L-R2
          const lr1Ids = [];
          for (let i = 0; i < wr1DropIdsForL0.length; i += 2) {
            const matchId = `lr1m${Math.floor(i / 2) + 1}`;
            const t1 = getBracketMatchLoser(wr1DropIdsForL0[i]);
            const t2 = (i + 1 < wr1DropIdsForL0.length) ? getBracketMatchLoser(wr1DropIdsForL0[i + 1]) : null;
            if (t2) {
              matches[matchId] = { id: matchId, t1, t2, round: 'L-R1' };
            } else {
              matches[matchId] = { id: matchId, t1, t2: null, round: 'L-R1 (bye)', bye: true };
            }
            lr1Ids.push(matchId);
          }
          const getLr1WinL0 = (id) => matches[id]?.bye ? matches[id]?.t1 : getBracketMatchTeam(id);

          // L-R2: merge with W-QF losers
          const lr2Ids = [];
          let lr2I = 1;
          const topC = Math.ceil(lr1Ids.length / 2);
          const topS = lr1Ids.slice(0, topC);
          const botS = lr1Ids.slice(topC);
          const topP = Math.max(topS.length, wqfDropsTop.length);
          for (let i = 0; i < topP; i++) {
            const mid = `lr2m${lr2I++}`;
            const s = i < topS.length ? getLr1WinL0(topS[i]) : null;
            const d = i < wqfDropsTop.length ? getBracketMatchLoser(wqfDropsTop[i]) : null;
            if (s && d) { matches[mid] = { id: mid, t1: s, t2: d, round: 'L-R2' }; }
            else { matches[mid] = { id: mid, t1: s || d, t2: null, round: 'L-R2 (bye)', bye: true }; }
            lr2Ids.push(mid);
          }
          const botP = Math.max(botS.length, wqfDropsBottom.length);
          for (let i = 0; i < botP; i++) {
            const mid = `lr2m${lr2I++}`;
            const s = i < botS.length ? getLr1WinL0(botS[i]) : null;
            const d = i < wqfDropsBottom.length ? getBracketMatchLoser(wqfDropsBottom[i]) : null;
            if (s && d) { matches[mid] = { id: mid, t1: s, t2: d, round: 'L-R2' }; }
            else { matches[mid] = { id: mid, t1: s || d, t2: null, round: 'L-R2 (bye)', bye: true }; }
            lr2Ids.push(mid);
          }
          const getLrWinL0 = (id) => {
            if (matches[id]?.bye) return matches[id]?.t1;
            return getBracketMatchTeam(id);
          };

          // Reduce → merge W-SF → L-Semi → L-Final
          let curIds = lr2Ids;
          let rn = 3;
          while (curIds.length > 2) {
            const nxt = []; let mn = 1;
            for (let i = 0; i < curIds.length; i += 2) {
              const mid = `lr${rn}m${mn++}`;
              if (i + 1 < curIds.length) { matches[mid] = { id: mid, t1: getLrWinL0(curIds[i]), t2: getLrWinL0(curIds[i + 1]), round: `L-R${rn}` }; }
              else { matches[mid] = { id: mid, t1: getLrWinL0(curIds[i]), t2: null, round: `L-R${rn} (bye)`, bye: true }; }
              nxt.push(mid);
            }
            curIds = nxt; rn++;
          }
          const wsfD = ['wsf1', 'wsf2'];
          const mrgIds = [];
          const mc = Math.max(curIds.length, wsfD.length);
          for (let i = 0; i < mc; i++) {
            const mid = `lr${rn}m${i + 1}`;
            const s = i < curIds.length ? getLrWinL0(curIds[i]) : null;
            const d = i < wsfD.length ? getBracketMatchLoser(wsfD[i]) : null;
            if (s && d) { matches[mid] = { id: mid, t1: s, t2: d, round: `L-R${rn}` }; }
            else { matches[mid] = { id: mid, t1: s || d, t2: null, round: `L-R${rn} (bye)`, bye: true }; }
            mrgIds.push(mid);
          }
          rn++;
          let fIds = mrgIds;
          while (fIds.length > 1) {
            if (fIds.length === 2) {
              matches.lsf = { id: 'lsf', t1: getLrWinL0(fIds[0]), t2: getLrWinL0(fIds[1]), round: 'L-Semi' };
              fIds = ['lsf'];
            } else {
              const nxt = []; let mn = 1;
              for (let i = 0; i < fIds.length; i += 2) {
                const mid = `lr${rn}m${mn++}`;
                if (i + 1 < fIds.length) { matches[mid] = { id: mid, t1: getLrWinL0(fIds[i]), t2: getLrWinL0(fIds[i + 1]), round: `L-R${rn}` }; }
                else { matches[mid] = { id: mid, t1: getLrWinL0(fIds[i]), t2: null, round: `L-R${rn} (bye)`, bye: true }; }
                nxt.push(mid);
              }
              fIds = nxt; rn++;
            }
          }
          matches.lf = { id: 'lf', t1: getLrWinL0(fIds[0]), t2: getBracketMatchLoser('wf'), round: 'L-Final' };
        } else if (L === 0) {
          // All teams in winners, no play-in — losers bracket from W-QF drops only
          const allWqfDrops = ['wqf1', 'wqf2', 'wqf3', 'wqf4'].filter(id => !matches[id]?.bye);
          if (allWqfDrops.length >= 4) {
            matches.lr2m1 = { id: 'lr2m1', t1: getBracketMatchLoser('wqf1'), t2: getBracketMatchLoser('wqf2'), round: 'L-R2' };
            matches.lr2m2 = { id: 'lr2m2', t1: getBracketMatchLoser('wqf3'), t2: getBracketMatchLoser('wqf4'), round: 'L-R2' };
          } else if (allWqfDrops.length === 3) {
            matches.lr2m1 = { id: 'lr2m1', t1: getBracketMatchLoser(allWqfDrops[0]), t2: getBracketMatchLoser(allWqfDrops[1]), round: 'L-R2' };
            matches.lr2m2 = { id: 'lr2m2', t1: getBracketMatchLoser(allWqfDrops[2]), t2: null, round: 'L-R2 (bye)', bye: true };
          } else if (allWqfDrops.length === 2) {
            matches.lr2m1 = { id: 'lr2m1', t1: getBracketMatchLoser(allWqfDrops[0]), t2: getBracketMatchLoser(allWqfDrops[1]), round: 'L-R2' };
          } else if (allWqfDrops.length === 1) {
            // Only 1 W-QF loser — they get a bye into L-R3
            matches.lr2m1 = { id: 'lr2m1', t1: getBracketMatchLoser(allWqfDrops[0]), t2: null, round: 'L-R2 (bye)', bye: true };
          }
          // W-SF losers always exist (W-SF always has 2 real teams)
          if (matches.lr2m2) {
            // 3-4 W-QF drops: lr2m1/lr2m2 winners merge with W-SF losers
            matches.lr3m1 = { id: 'lr3m1', t1: getBracketMatchTeam('lr2m1'), t2: getBracketMatchLoser('wsf2'), round: 'L-R3' };
            matches.lr3m2 = { id: 'lr3m2', t1: matches.lr2m2.bye ? matches.lr2m2.t1 : getBracketMatchTeam('lr2m2'), t2: getBracketMatchLoser('wsf1'), round: 'L-R3' };
            matches.lsf = { id: 'lsf', t1: getBracketMatchTeam('lr3m1') || (matches.lr3m1.bye ? matches.lr3m1.t1 : null), t2: getBracketMatchTeam('lr3m2') || (matches.lr3m2.bye ? matches.lr3m2.t1 : null), round: 'L-Semi' };
          } else {
            // 1-2 W-QF drops: lr2m1 winner merges with wsf2, then meets wsf1 in L-Semi
            matches.lr3m1 = { id: 'lr3m1', t1: matches.lr2m1?.bye ? matches.lr2m1.t1 : getBracketMatchTeam('lr2m1'), t2: getBracketMatchLoser('wsf2'), round: 'L-R3' };
            matches.lsf = { id: 'lsf', t1: getBracketMatchTeam('lr3m1') || (matches.lr3m1.bye ? matches.lr3m1.t1 : null), t2: getBracketMatchLoser('wsf1'), round: 'L-Semi' };
          }
          matches.lf = { id: 'lf', t1: getBracketMatchTeam('lsf') || (matches.lsf.bye ? matches.lsf.t1 : null), t2: getBracketMatchLoser('wf'), round: 'L-Final' };
        } else {
          // === L-R1: Initial losers play each other ===
          const lr1Pairings = [];
          if (L <= 2) {
            if (L === 1) lr1Pairings.push([0, null]);
            else lr1Pairings.push([0, 1]);
          } else if (L <= 4) {
            lr1Pairings.push([0, L > 3 ? 3 : null]);
            lr1Pairings.push([1, 2]);
          } else if (L <= 6) {
            lr1Pairings.push([0, L > 5 ? 5 : null]);
            lr1Pairings.push([3, 4]);
            lr1Pairings.push([1, 2]);
          } else if (L <= 8) {
            lr1Pairings.push([0, L > 7 ? 7 : null]);
            lr1Pairings.push([3, 4]);
            lr1Pairings.push([1, L > 6 ? 6 : null]);
            lr1Pairings.push([2, 5]);
          } else if (L <= 10) {
            // 9-10 losers: 5 matches
            lr1Pairings.push([0, L > 9 ? 9 : null]);
            lr1Pairings.push([4, 5]);
            lr1Pairings.push([7, 8]);
            lr1Pairings.push([1, L > 6 ? 6 : null]);
            lr1Pairings.push([2, 3]);
          } else {
            // 11-12 losers: 6 matches
            lr1Pairings.push([0, L > 11 ? 11 : null]);
            lr1Pairings.push([5, 6]);
            lr1Pairings.push([3, 8]);
            lr1Pairings.push([4, 7]);
            lr1Pairings.push([1, L > 10 ? 10 : null]);
            lr1Pairings.push([2, 9]);
          }

          const lr1WinnerIds = [];
          lr1Pairings.forEach(([i1, i2], idx) => {
            const matchId = `lr1m${idx + 1}`;
            if (i2 === null) {
              matches[matchId] = { id: matchId, t1: l[i1], t2: null, round: 'L-R1 (bye)', bye: true, court: 5 + idx };
            } else {
              matches[matchId] = { id: matchId, t1: l[i1], t2: l[i2], round: 'L-R1', court: 5 + idx };
            }
            lr1WinnerIds.push(matchId);
          });

          const getLr1Win = (id) => matches[id]?.bye ? matches[id]?.t1 : getBracketMatchTeam(id);

          // === W-R1 losers merge (if play-in exists) ===
          const wr1DropIds = Object.keys(matches).filter(id => id.startsWith('wr1m') && !matches[id].bye);
          let preWqfMergeIds = lr1WinnerIds;

          if (wr1DropIds.length > 0) {
            // Merge L-R1 survivors with W-R1 losers (crossed for rematch prevention)
            const wr1DropsTop = ['wr1m2', 'wr1m3'].filter(id => matches[id] && !matches[id].bye);
            const wr1DropsBottom = ['wr1m1', 'wr1m4'].filter(id => matches[id] && !matches[id].bye);

            const lr1TopCount = Math.ceil(lr1WinnerIds.length / 2);
            const lr1TopIds = lr1WinnerIds.slice(0, lr1TopCount);
            const lr1BottomIds = lr1WinnerIds.slice(lr1TopCount);

            const mergeIds = [];
            let mergeIdx = 1;

            const topMergeCount = Math.max(lr1TopIds.length, wr1DropsTop.length);
            for (let i = 0; i < topMergeCount; i++) {
              const matchId = `lr15m${mergeIdx++}`;
              const survivor = i < lr1TopIds.length ? getLr1Win(lr1TopIds[i]) : null;
              const drop = i < wr1DropsTop.length ? getBracketMatchLoser(wr1DropsTop[i]) : null;
              if (survivor && drop) {
                matches[matchId] = { id: matchId, t1: survivor, t2: drop, round: 'L-R1.5' };
              } else {
                matches[matchId] = { id: matchId, t1: survivor || drop, t2: null, round: 'L-R1.5 (bye)', bye: true };
              }
              mergeIds.push(matchId);
            }

            const bottomMergeCount = Math.max(lr1BottomIds.length, wr1DropsBottom.length);
            for (let i = 0; i < bottomMergeCount; i++) {
              const matchId = `lr15m${mergeIdx++}`;
              const survivor = i < lr1BottomIds.length ? getLr1Win(lr1BottomIds[i]) : null;
              const drop = i < wr1DropsBottom.length ? getBracketMatchLoser(wr1DropsBottom[i]) : null;
              if (survivor && drop) {
                matches[matchId] = { id: matchId, t1: survivor, t2: drop, round: 'L-R1.5' };
              } else {
                matches[matchId] = { id: matchId, t1: survivor || drop, t2: null, round: 'L-R1.5 (bye)', bye: true };
              }
              mergeIds.push(matchId);
            }

            preWqfMergeIds = mergeIds;
          }

          // === L-R2: Merge survivors with W-QF losers (crossed) ===
          const getLr15Win = (id) => matches[id]?.bye ? matches[id]?.t1 : getBracketMatchTeam(id);
          // Placeholder for pending feeder match results (shows "TBD" but keeps match visible)
          const pending = (feederId, type) => {
            const m = matches[feederId];
            const label = m ? `${type} of ${m.round.replace(' (bye)', '')}` : 'TBD';
            return { seed: null, name: label, pending: true };
          };
          const topCount = Math.ceil(preWqfMergeIds.length / 2);
          const topSurvivorIds = preWqfMergeIds.slice(0, topCount);
          const bottomSurvivorIds = preWqfMergeIds.slice(topCount);

          const lr2WinnerIds = [];
          let lr2Idx = 1;

          // Top half: survivors paired with wqfDropsTop
          const topPairs = Math.max(topSurvivorIds.length, wqfDropsTop.length);
          for (let i = 0; i < topPairs; i++) {
            const matchId = `lr2m${lr2Idx++}`;
            const survivor = i < topSurvivorIds.length ? (getLr15Win(topSurvivorIds[i]) || pending(topSurvivorIds[i], 'Winner')) : null;

            const drop = i < wqfDropsBottom.length ? (getBracketMatchLoser(wqfDropsBottom[i]) || pending(wqfDropsBottom[i], 'Loser')) : null;

            if (sc && sc.s1 !== '' && sc.s2 !== '' && sc.s1 !== undefined && sc.s2 !== undefined) {

                } else {

          results += `------------------------------\n`;
          round.matches.forEach(m => {
            const score = seedingScores[m.id];
            if (score && score.s1 !== undefined && score.s2 !== undefined) {
              const s1Won = parseInt(score.s1) > parseInt(score.s2);
              results += `${s1Won ? '✓' : ' '} ${m.t1.name} ${score.s1}-${score.s2} ${m.t2.name} ${!s1Won ? '✓' : ''}\n`;

        });

        results += `\n==================================================\n`;
        results += `BRACKET SCORES\n`;
        results += `==================================================\n\n`;

        const formatBracketMatch = (id, label) => {
          const match = bracketMatches[id];
          const score = bracketScores[id];
          if (!match || !match.t1 || !match.t2) return '';
          if (!score) return `${label}: ${match.t1.name} vs ${match.t2.name} - Not played\n`;

            const t1Wins = score.games.filter(g => g.s1 > g.s2).length;
            const t2Wins = score.games.filter(g => g.s2 > g.s1).length;
            const winner = t1Wins > t2Wins ? match.t1.name : match.t2.name;

                  override={bracketPreview ? undefined : bracketOverrides[id]}
                  isOnCourt={bracketPreview ? false : !!onCourt[id]}
                  courtNum={bracketPreview ? undefined : onCourt[id]}
                  showOverride={bracketPreview ? false : showOverride}
                  onScoreChange={(field, value) => handleBracketScore(id, m?.t1, m?.t2, field, value)}
                  onBo3ScoreChange={m?.bo3 ? (gi, field, value) => handleBo3Score(id, m?.t1, m?.t2, gi, field, value) : undefined}
                  onToggleCourt={() => toggleOnCourt(id)}
                  onSetCourt={(ct) => setMatchCourt(id, ct)}
                  courtCount={courtCount}
                  onOverride={(team) => handleBracketOverride(id, team, team === m?.t1 ? m?.t2 : m?.t1)}
                  onClearOverride={() => clearBracketOverride(id)}
                  winner={bracketPreview ? null : getBracketMatchTeam(id)}
                  readOnly={spectatorMode || bracketPreview}
                />
              );
            };

            // Column helper: renders a labeled column of matches
            const col = (label, ids, opts = {}) => {
              const validIds = ids.filter(id => bracketMatches[id] && !bracketMatches[id].bye && !bracketOverrides[id]?.hidden);
              if (!validIds.length) return null;
              return (
                <div className={`space-y-2 w-44 flex-shrink-0 ${opts.pt || ''}`}>
                  <div className="text-xs text-gray-500 text-center">{label}</div>
                  {validIds.map((id, idx) => (
                    <React.Fragment key={id}>
                      {renderMatch(id)}
                      {opts.gap && idx < validIds.length - 1 && <div className={opts.gap}></div>}
                    </React.Fragment>
                  ))}
                </div>
              );
            };

            return (
            <div className="max-w-6xl mx-auto overflow-x-auto">
              {bracketPreview && (
                <div className="mb-3 bg-blue-900/50 border border-blue-600 rounded p-2 text-sm text-center text-blue-300">
                  Bracket Preview — seeds will be filled after round robin is complete
                </div>
              )}
              {!spectatorMode && !bracketPreview && <CourtStatus onCourtMatches={onCourtMatches} nextUpMatches={nextUpMatches} onToggleCourt={toggleOnCourt} onCourt={onCourt} />}

              {bracketSwaps.length > 0 && !bracketPreview && !spectatorMode && !bracketSeedOverride && (
                <div className="mb-3 bg-yellow-900/50 border border-yellow-600 rounded p-3 text-sm">
                  <div className="font-semibold text-yellow-400 mb-1">🔄 Suggested Seeding Adjustments (No Pool Rematches in R1)</div>
                  {bracketSwaps.map((swap, i) => (
                    <label key={i} className="flex items-center gap-2 text-yellow-200 text-xs cursor-pointer">
                      <input
                        type="checkbox"
                        checked={swapSelections[i] !== false}
                        onChange={() => setSwapSelections(prev => ({...prev, [i]: prev[i] === false ? true : false}))}
                      />
                      {swap.description}
                    </label>
                  ))}
                  <div className="flex gap-2 mt-2">
                    <button onClick={() => {
                      const w = [...bracketTeams.unswappedWinners];
                      const l = [...bracketTeams.unswappedLosers];
                      bracketSwaps.forEach((swap, i) => {
                        if (swapSelections[i] !== false) {
                          const arr = swap.side === 'winners' ? w : l;
                          [arr[swap.j], arr[swap.k]] = [arr[swap.k], arr[swap.j]];
                        }
                      });
                      setBracketSeedOverride({ winners: w, losers: l });
                    }} className="text-xs bg-green-600 hover:bg-green-500 px-3 py-1 rounded font-semibold">
                      Apply Selected
                    </button>
                    <button onClick={() => setBracketSeedOverride({ winners: bracketTeams.unswappedWinners, losers: bracketTeams.unswappedLosers })} className="text-xs bg-red-600 hover:bg-red-500 px-3 py-1 rounded font-semibold">
                      Keep Original Seeding
                    </button>
                  </div>
                </div>
              )}
              {bracketSwaps.length > 0 && !bracketPreview && !spectatorMode && bracketSeedOverride && bracketTeams.swaps?.length > 0 && (
                <div className="mb-3 bg-yellow-900/50 border border-yellow-600 rounded p-2 text-sm">
                  <div className="font-semibold text-yellow-400 mb-1">🔄 Seeding Adjusted (No Pool Rematches in R1)</div>
                  {bracketSwaps.map((swap, i) => (
                    <div key={i} className="text-yellow-200 text-xs">{swap.description}</div>
                  ))}
                </div>
              )}

              <div className="flex justify-between items-center mb-2">
                <h2 className="text-lg font-semibold text-blue-400">{bracketType === 'single' ? 'Single Elimination' : 'Winners Bracket'}</h2>
                {!spectatorMode && !bracketPreview && (
                  <div className="flex items-center gap-3">
                    <button onClick={generateFakeBracketScores} title="Generate fake bracket scores based on seeding for testing" className="text-xs bg-purple-700 hover:bg-purple-600 px-2 py-1 rounded">🎲 Test Scores</button>
                    <label className="text-xs text-gray-500 flex items-center gap-1">
                      <input type="checkbox" checked={showOverride} onChange={(e) => setShowOverride(e.target.checked)} />
                      Override
                    </label>
                  </div>
                )}
              </div>

              {showOverride && !spectatorMode && bracketType === 'double' && bracketTeams.winners.length > 0 && (
                <div className="mb-3 bg-gray-800 rounded p-3">
                  <div className="flex justify-between items-center mb-2">
                    <span className="text-sm font-semibold">Flip Bracket Seeds</span>
                    <div className="flex gap-2">
                      {selectedSwapTeam && <span className="text-xs text-yellow-400">Click another team to swap</span>}
                      {bracketSeedOverride && (
                        <button onClick={() => { setBracketSeedOverride(null); setBracketScores({}); setBracketOverrides({}); setSelectedSwapTeam(null); }} className="text-xs text-gray-400 hover:text-white bg-gray-700 px-2 py-0.5 rounded">Reset Seeds</button>
                      )}
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <div className="text-xs text-blue-400 mb-1 font-semibold">Winners Bracket</div>
                      {bracketTeams.winners.map((t, i) => {
                        const isSelected = selectedSwapTeam?.side === 'winners' && selectedSwapTeam?.pos === i;
                        return (
                          <div key={t.seed} className={`text-xs py-1 px-2 rounded cursor-pointer flex items-center gap-1 ${isSelected ? 'bg-yellow-600 text-white' : 'hover:bg-gray-700'}`} onClick={() => handleSeedSwap('winners', i)}>
                            <span className="font-mono w-6">W{i+1}.</span>
                            <span className="flex-1 truncate">{(t?.name || 'TBD').split(' / ').map(n => n.split(' ')[0]).join(' / ')}</span>
                          </div>
                        );
                      })}
                    </div>
                    {bracketTeams.losers.length > 0 && <div>
                      <div className="text-xs text-red-400 mb-1 font-semibold">Losers Bracket</div>
                      {bracketTeams.losers.map((t, i) => {
                        const isSelected = selectedSwapTeam?.side === 'losers' && selectedSwapTeam?.pos === i;
                        return (
                          <div key={t.seed} className={`text-xs py-1 px-2 rounded cursor-pointer flex items-center gap-1 ${isSelected ? 'bg-yellow-600 text-white' : 'hover:bg-gray-700'}`} onClick={() => handleSeedSwap('losers', i)}>
                            <span className="font-mono w-6">L{i+1}.</span>
                            <span className="flex-1 truncate">{(t?.name || 'TBD').split(' / ').map(n => n.split(' ')[0]).join(' / ')}</span>
                          </div>
                        );
                      })}
                    </div>}
                  </div>
                </div>
              )}

              {/* ====== SINGLE ELIMINATION LAYOUT ====== */}
              {bracketType === 'single' && (
                <div className="flex gap-3 pb-4">
                  {teamCount > 8 && col('R1', ['se_r1m1','se_r1m2','se_r1m3','se_r1m4'])}
                  {col('QF', ['se_qf1','se_qf2','se_qf3','se_qf4'])}
                  {col('SF', ['se_sf1','se_sf2'], { pt: 'pt-10', gap: 'h-12' })}
                  <div className="w-48 flex-shrink-0 pt-16">
                    <div className="text-xs text-gray-500 text-center">Final</div>
                    {renderMatch('se_f')}
                    {getBracketMatchTeam('se_f') && (
                      <div className="mt-3 bg-gradient-to-r from-yellow-700 to-yellow-600 p-3 rounded text-center border-2 border-yellow-400">
                        <div className="text-xs text-yellow-200">🥇 CHAMPION{showPayouts ? ` — $${currentPayouts.first}` : ''}</div>
                        {(getBracketMatchTeam('se_f')?.name || 'TBD').split(' / ').map((p, i) => (
                          <div key={i} className="text-sm font-bold text-white">{p}</div>
                        ))}
                      </div>
                    )}
                    {getBracketMatchLoser('se_f') && (
                      <div className="mt-2 bg-gradient-to-r from-gray-500 to-gray-400 p-2 rounded text-center border border-gray-300">
                        <div className="text-xs text-gray-200">🥈 2nd Place{showPayouts ? ` — $${currentPayouts.second}` : ''}</div>
                        {(getBracketMatchLoser('se_f')?.name || 'TBD').split(' / ').map((p, i) => (
                          <div key={i} className="text-xs font-semibold text-white">{p}</div>
                        ))}
                      </div>
                    )}
                    <div className="mt-4">
                      <div className="text-xs text-gray-500 text-center mb-1">3rd Place Match</div>
                      {renderMatch('se_3rd')}
                      {getBracketMatchTeam('se_3rd') && (
                        <div className="mt-2 bg-gradient-to-r from-amber-800 to-amber-700 p-2 rounded text-center border border-amber-500">
                          <div className="text-xs text-amber-200">🥉 3rd Place{showPayouts && currentPayouts.third ? ` — $${currentPayouts.third}` : ''}</div>
                          {(getBracketMatchTeam('se_3rd')?.name || 'TBD').split(' / ').map((p, i) => (
                            <div key={i} className="text-xs font-semibold text-white">{p}</div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </div>
              )}

              {/* ====== DOUBLE ELIMINATION LAYOUT ====== */}
              {bracketType === 'double' && (
                <>
                  {(() => {
                    // Build bracket tree: QF → SF → Final → GF
                    // Each SF centers between its two QF feeders; Final centers between SFs
                    const qfIds = ['wqf1','wqf2','wqf3','wqf4'];
                    const qfVisible = qfIds.filter(id => bracketMatches[id] && !bracketMatches[id].bye);
                    // SF feeders: wsf1 ← wqf1+wqf2, wsf2 ← wqf3+wqf4
                    const sfTop = ['wqf1','wqf2'].filter(id => bracketMatches[id] && !bracketMatches[id].bye);
                    const sfBot = ['wqf3','wqf4'].filter(id => bracketMatches[id] && !bracketMatches[id].bye);
                    const hasWsf1 = bracketMatches['wsf1'] && !bracketMatches['wsf1']?.bye;
                    const hasWsf2 = bracketMatches['wsf2'] && !bracketMatches['wsf2']?.bye;

                    // Render a bracket group: feeders on left, result centered on right
                    // Returns the QF column + SF column as a vertical flex tree
                    return (
                      <div className="flex gap-3 pb-4 items-start">
                        {/* W-QF + W-SF as bracket tree */}
                        <div className="flex gap-3 items-start">
                          {/* QF column */}
                          <div className="w-44 flex-shrink-0">
                            <div className="text-xs text-gray-500 text-center mb-1">W-QF</div>
                            <div className="flex flex-col">
                              {/* Top half: wqf1, wqf2 */}
                              <div className="flex flex-col gap-2">
                                {sfTop.map(id => <React.Fragment key={id}>{renderMatch(id)}</React.Fragment>)}
                              </div>
                              {/* Spacer between halves */}
                              {sfTop.length > 0 && sfBot.length > 0 && <div className="h-6"></div>}
                              {/* Bottom half: wqf3, wqf4 */}
                              <div className="flex flex-col gap-2">
                                {sfBot.map(id => <React.Fragment key={id}>{renderMatch(id)}</React.Fragment>)}
                              </div>
                            </div>
                          </div>
                          {/* SF column — each SF vertically centered to its QF group */}
                          <div className="w-44 flex-shrink-0 flex flex-col justify-around" style={{ alignSelf: 'stretch' }}>
                            <div className="text-xs text-gray-500 text-center mb-1">W-SF</div>
                            <div className="flex flex-col justify-around flex-1">
                              {hasWsf1 && <div>{renderMatch('wsf1')}</div>}
                              {hasWsf2 && <div>{renderMatch('wsf2')}</div>}
                            </div>
                          </div>
                        </div>
                        {/* W-Final — centered to full height */}
                        <div className="w-44 flex-shrink-0 flex flex-col justify-center" style={{ alignSelf: 'stretch' }}>
                          <div className="text-xs text-gray-500 text-center">W-Final</div>
                          {renderMatch('wf')}
                        </div>
                        {/* Grand Final + results */}
                        <div className="w-56 flex-shrink-0 flex flex-col justify-center" style={{ alignSelf: 'stretch' }}>
                          <h3 className="text-yellow-400 font-semibold mb-2 text-center text-sm">🏆 Grand Final</h3>
                          {renderMatch('gf')}
                          {bracketMatches['gf2'] && (
                            <div className="mt-2">
                              <div className="text-xs text-yellow-400 text-center mb-1">Game to 15</div>
                              {renderMatch('gf2')}
                            </div>
                          )}
                          {gfWinner && (
                            <div className="mt-3 bg-gradient-to-r from-yellow-700 to-yellow-600 p-3 rounded text-center border-2 border-yellow-400">
                              <div className="text-xs text-yellow-200">🥇 CHAMPION{showPayouts ? ` — $${currentPayouts.first}` : ''}</div>
                              {(gfWinner?.name || 'TBD').split(' / ').map((p, i) => (
                                <div key={i} className="text-sm font-bold text-white">{p}</div>
                              ))}
                            </div>
                          )}
                          {getBracketMatchLoser(finalMatchId) && (
                            <div className="mt-2 bg-gradient-to-r from-gray-500 to-gray-400 p-2 rounded text-center border border-gray-300">
                              <div className="text-xs text-gray-200">🥈 2nd Place{showPayouts ? ` — $${currentPayouts.second}` : ''}</div>
                              {(getBracketMatchLoser(finalMatchId)?.name || 'TBD').split(' / ').map((p, i) => (
                                <div key={i} className="text-xs font-semibold text-white">{p}</div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })()}

                  <h2 className="text-lg font-semibold text-red-400 mb-2">Losers Bracket</h2>
                  <div className="flex gap-3 pb-4 overflow-x-auto items-center">
                    {(() => {
                      // Dynamically render losers bracket rounds from bracketMatches
                      const losersRounds = {};
                      Object.values(bracketMatches).forEach(m => {
                        if (m.id === 'lsf' || m.id === 'lf' || m.id === 'gf' || m.id === 'gf2') return;
                        if (!m.id.startsWith('lr')) return;
                        let roundMatch = m.round.replace(' (bye)', '');
                        if (!losersRounds[roundMatch]) losersRounds[roundMatch] = [];
                        losersRounds[roundMatch].push(m.id);
                      });
                      const sortedRounds = Object.keys(losersRounds).sort((a, b) => {
                        const numA = parseFloat(a.replace('L-R', '')) || 0;
                        const numB = parseFloat(b.replace('L-R', '')) || 0;
                        return numA - numB;
                      });
                      return sortedRounds.map((round, i) => {
                        const currCount = losersRounds[round].filter(id => bracketMatches[id] && !bracketMatches[id].bye).length;
                        const gap = currCount <= 2 ? 'h-6' : undefined;
                        return col(round, losersRounds[round], { gap });
                      });
                    })()}
                    {bracketMatches.lsf && (
                    <div className="w-44 flex-shrink-0">
                      <div className="text-xs text-gray-500 text-center">L-Semi</div>
                      {renderMatch('lsf')}
                    </div>
                    )}
                    <div className="w-44 flex-shrink-0">
                      <div className="text-xs text-gray-500 text-center">L-Final</div>
                      {renderMatch('lf')}
                      {getBracketMatchTeam('lf') && (
                        <div className="mt-2 text-center">
                          <div className="text-xs text-yellow-400">↗ to Grand Final</div>
                        </div>
                      )}
                      {getBracketMatchLoser('lf') && (
                        <div className="mt-2 bg-gradient-to-r from-amber-800 to-amber-700 p-2 rounded text-center border border-amber-500">
                          <div className="text-xs text-amber-200">🥉 3rd Place{showPayouts && currentPayouts.third ? ` — $${currentPayouts.third}` : ''}</div>
                          {(getBracketMatchLoser('lf')?.name || 'TBD').split(' / ').map((p, i) => (
                            <div key={i} className="text-xs font-semibold text-white">{p}</div>
                          ))}
                        </div>
                      )}
                    </div>
                  </div>
                </>
              )}
            </div>
            );
          })()}

          {phase === 'results' && (
            <div className="max-w-2xl mx-auto">
              <h2 className="text-2xl font-bold text-center mb-6">🏆 Final Results</h2>

              <div className="space-y-4">
                {gfWinner && (
                  <div className="bg-gradient-to-r from-yellow-700 to-yellow-600 p-6 rounded-lg border-2 border-yellow-400 text-center">
                    <div className="text-lg text-yellow-200">🥇 1st Place{showPayouts ? ` — $${currentPayouts.first}` : ''}</div>
                    {(gfWinner?.name || 'TBD').split(' / ').map((p, i) => (
                      <div key={i} className="text-2xl font-bold text-white">{p}</div>
                    ))}
                  </div>
                )}

                {getBracketMatchLoser(finalMatchId) && (
                  <div className="bg-gradient-to-r from-gray-500 to-gray-400 p-5 rounded-lg border-2 border-gray-300 text-center">
                    <div className="text-md text-gray-200">🥈 2nd Place{showPayouts ? ` — $${currentPayouts.second}` : ''}</div>
                    {(getBracketMatchLoser(finalMatchId)?.name || 'TBD').split(' / ').map((p, i) => (
                      <div key={i} className="text-xl font-bold text-white">{p}</div>
                    ))}
                  </div>
                )}

                {(bracketType === 'single' ? getBracketMatchTeam(thirdMatchId) : getBracketMatchLoser(thirdMatchId)) && (
                  <div className="bg-gradient-to-r from-amber-800 to-amber-700 p-4 rounded-lg border-2 border-amber-500 text-center">
                    <div className="text-sm text-amber-200">🥉 3rd Place{showPayouts && currentPayouts.third ? ` — $${currentPayouts.third}` : ''}</div>
                    {(bracketType === 'single' ? getBracketMatchTeam(thirdMatchId) : (getBracketMatchLoser(thirdMatchId))?.name || 'TBD').split(' / ').map((p, i) => (
                      <div key={i} className="text-lg font-bold text-white">{p}</div>
                    ))}
                  </div>
                )}
              </div>

              <div className="mt-8 text-center">
                <button onClick={downloadResults} className="bg-green-600 hover:bg-green-500 px-6 py-3 rounded-lg text-lg font-semibold">
                  📥 Download Full Results
                </button>
              </div>

            </div>
          )}

            </>
          )}
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { error: null }; }
      static getDerivedStateFromError(error) { return { error }; }
      componentDidCatch(e, info) { console.error('React Error:', e, info); }
      render() {
        if (this.state.error) return (<div style={{padding:'40px',color:'red',background:'#111',fontFamily:'monospace'}}>
          <h2>Error caught:</h2><pre style={{whiteSpace:'pre-wrap'}}>{this.state.error.toString()}{'\n'}{this.state.error.stack}</pre>
          <button onClick={() => this.setState({error:null})} style={{marginTop:'20px',padding:'10px',background:'#333',color:'white',border:'none',cursor:'pointer'}}>Try Again</button>
        </div>);
        return this.props.children;
      }
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App /></ErrorBoundary>);
  </script>
</body>
</html>
